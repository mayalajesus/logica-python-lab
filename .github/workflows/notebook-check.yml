name: Notebook Check

on:
  push:
    paths:
      - "**.ipynb"
      - ".github/workflows/notebook-check.yml"
  pull_request:
    paths:
      - "**.ipynb"
      - ".github/workflows/notebook-check.yml"

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate notebooks
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          notebooks = sorted(Path(".").glob("*.ipynb"))
          assert len(notebooks) == 7, f"Esperados 7 notebooks, encontrados {len(notebooks)}."

          total = 0
          for path in notebooks:
              data = json.loads(path.read_text(encoding="utf-8"))
              activities = sum(
                  1
                  for cell in data["cells"]
                  if cell["cell_type"] == "markdown"
                  and "".join(cell["source"]).startswith("### Atividade")
              )
              print(f"{path}: {activities} atividades")
              assert activities > 0, f"{path} não possui atividades."
              total += activities

          print(f"Total de atividades: {total}")
          assert total == 156, "A trilha deve manter 156 atividades."
          PY
